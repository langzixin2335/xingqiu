upstream shining_planet_api {
    server 127.0.0.1:8020;
}

# 闪耀星球 - IP 直连（保留）
server {
    listen 80;
    server_name 39.105.51.80;

    client_max_body_size 50M;
    root /home/shareholder/shining-planet/frontend;
    index index.html;

    location /api/ {
        proxy_pass http://shining_planet_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        alias /home/shareholder/shining-planet/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /downloads/ {
        alias /home/shareholder/shining-planet/frontend/downloads/;
        types { application/vnd.android.package-archive apk; }
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# 闪耀星球 - 演示域名（已备案 dongme.me 子域名）
server {
    listen 80;
    server_name xq.dongme.me;
    return 301 https://xq.dongme.me$request_uri;
}

server {
    listen 443 ssl;
    server_name xq.dongme.me;

    ssl_certificate /etc/ssl/dongme.me/fullchain.cer;
    ssl_certificate_key /etc/ssl/dongme.me/dongme.me.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;
    root /home/shareholder/shining-planet/frontend;
    index index.html;

    location /api/ {
        proxy_pass http://shining_planet_api/api/;
