    }
}

# 闪耀星球 - m.laios.cn（未备案，保留；大陆访问可能受阻）
server {
    listen 80;
    server_name m.laios.cn;

    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://m.laios.cn$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name m.laios.cn;

    ssl_certificate /etc/letsencrypt/live/m.laios.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/m.laios.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;
    root /home/shareholder/shining-planet/frontend;
    index index.html;

    location /api/ {
        proxy_pass http://shining_planet_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        alias /home/shareholder/shining-planet/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /downloads/ {
        alias /home/shareholder/shining-planet/frontend/downloads/;
        types { application/vnd.android.package-archive apk; }
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
